server:
  port: 8084

spring:
  application:
    name: push-service

  kafka:
    bootstrap-servers: localhost:9092

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.nds: DEBUG
    org.springframework.kafka: INFO
